name: Generate SBOM

on:
  push:
    branches: ['main', 'master']
  workflow_dispatch:

jobs:
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm sbom --omit=dev --sbom-format spdx > sbom.spdx.json
      - uses: actions/upload-artifact@v6
        with:
          name: sbom-spdx
          path: sbom.spdx.json
